backend:
  name: github
  repo: arqamxscales/The-Voice-of-Islamabad
  branch: main

local_backend: false

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options: ["news", "media", "business", "politics", "technology"]
        }
      - { label: "Cover Image", name: "coverImage", widget: "image" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Title (English)", name: "title_en", widget: "string" }
      - { label: "Title (Urdu)", name: "title_ur", widget: "string" }
      - { label: "Excerpt (English)", name: "excerpt_en", widget: "text" }
      - { label: "Excerpt (Urdu)", name: "excerpt_ur", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "site"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "content/site.json"
        fields:
          - { label: "Site Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - label: "Ticker"
            name: "ticker"
            widget: "object"
            fields:
              - label: "English"
                name: "en"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
              - label: "Urdu"
                name: "ur"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Urdu", name: "ur", widget: "text" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
              - label: "Address"
                name: "address"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Urdu", name: "ur", widget: "string" }
